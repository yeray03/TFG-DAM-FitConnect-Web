<section class="min-h-screen bg-gray-50 py-20">

            <label class="block text-sm font-bold text-gray-700 mb-2">Mensaje</label>
            <textarea rows="4" placeholder="¿En qué podemos ayudarte?" 
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-fit-accent focus:ring-2 focus:ring-fit-accent/20 outline-none transition"></textarea>

          <button type="submit"

            </li>
            <li class="flex items-center gap-3">
              <span class="bg-white/20 p-2 rounded-lg">📞</span>

            <li class="flex items-center gap-3">
              <span class="bg-white/20 p-2 rounded-lg">✉️</span>
