<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Biblioteca de Rutinas</h2>
    <button class="bg-fit-accent text-white px-4 py-2 rounded-lg hover:bg-opacity-90 transition">
      + Nueva Rutina
    </button>
  </div>

  <div class="bg-white shadow rounded-lg overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="p-4 text-sm font-semibold text-gray-600">Nombre</th>
          <th class="p-4 text-sm font-semibold text-gray-600">Nivel</th>
          <th class="p-4 text-sm font-semibold text-gray-600">Objetivo</th>
          <th class="p-4 text-sm font-semibold text-gray-600">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        @for (rutina of rutinas; track rutina.id) {
          <tr class="hover:bg-gray-50">
            <td class="p-4 text-sm font-medium text-gray-900">{{ rutina.nombre }}</td>
            <td class="p-4 text-sm text-gray-600">{{ rutina.nivel }}</td>
            <td class="p-4 text-sm text-gray-600">{{ rutina.objetivo }}</td>
            <td class="p-4 text-sm">
              <button class="text-blue-600 hover:text-blue-800 mr-3">Editar</button>
              <button class="text-red-600 hover:text-red-800">Eliminar</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
